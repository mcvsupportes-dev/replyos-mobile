name: replyos
description: ReplyOS - AI Assistant for WhatsApp business users (Arabic-first, RTL).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase (compatible with Flutter 3.27 / Dart 3.6)
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  firebase_database: ^10.4.9
  firebase_storage: ^11.6.9

  # Auth
  google_sign_in: ^6.2.1

  # State management
  provider: ^6.1.2

  # UI / Animations
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  cached_network_image: ^3.3.1

  # Media / Files
  image_picker: ^1.0.7
  file_picker: ^6.2.1

  # Storage / Localization
  shared_preferences: ^2.2.2
  intl: ^0.18.1

  # Networking
  http: ^1.2.0

  # Notifications & External
  flutter_local_notifications: ^17.2.4
  url_launcher: ^6.2.5

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
